name: Unstick prod (one-off)

# One-shot remediation: prod crashed on startup after v3.1.0 because the new
# SecurityStartupValidator refuses to boot on the 'cloud' profile when
# APP_AUTH_SECRET or APP_ADMIN_DEFAULT_PASSWORD equal known-weak values.
# This workflow logs into prod CF, unsets those vars, and restages the app.
# All inputs used in run: steps come from repository secrets (trusted).
# Delete this workflow after prod is healthy.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CF_CLI_VERSION: "8"
  APP_NAME: cf-llama-chat

jobs:
  unstick:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install CF CLI
        run: |
          wget -q "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v${CF_CLI_VERSION}&source=github" -O cf-cli.tgz
          tar -xzf cf-cli.tgz
          sudo mv cf8 /usr/local/bin/cf
          cf version

      - name: Login to Cloud Foundry (Prod)
        env:
          CF_API: ${{ secrets.CF_API_PROD }}
          CF_USERNAME: ${{ secrets.CF_USERNAME_PROD }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD_PROD }}
          CF_ORG: ${{ secrets.CF_ORG_PROD }}
          CF_SPACE: ${{ secrets.CF_SPACE_PROD }}
        run: |
          cf api "$CF_API"
          cf auth "$CF_USERNAME" "$CF_PASSWORD"
          cf target -o "$CF_ORG" -s "$CF_SPACE"

      - name: Show which weak env keys are set (redacted)
        run: |
          echo "=== Current env keys on $APP_NAME ==="
          cf env "$APP_NAME" \
            | grep -E '^(APP_AUTH_SECRET|APP_ADMIN_DEFAULT_PASSWORD|SPRING_PROFILES_ACTIVE|APP_VERSION):' \
            | awk -F: '{print $1": <redacted>"}' || true

      - name: Show recent crash logs
        run: |
          echo "=== Recent logs (may reveal the startup-refusal reason) ==="
          cf logs "$APP_NAME" --recent \
            | grep -E 'SecurityStartupValidator|Startup refused|weak|IllegalStateException|Caused by' \
            | head -40 || echo "(no matching lines — validator may not be the cause)"

      - name: Unset weak env vars
        run: |
          set -eu
          cf unset-env "$APP_NAME" APP_AUTH_SECRET || echo "APP_AUTH_SECRET not set"
          cf unset-env "$APP_NAME" APP_ADMIN_DEFAULT_PASSWORD || echo "APP_ADMIN_DEFAULT_PASSWORD not set"

      - name: Restage
        run: |
          cf restage "$APP_NAME"
          cf app "$APP_NAME"

      - name: Summary
        run: |
          {
            echo "## Prod Unstick"
            echo ""
            echo "Unset APP_AUTH_SECRET + APP_ADMIN_DEFAULT_PASSWORD and restaged $APP_NAME."
            echo ""
            echo "Delete .github/workflows/unstick-prod.yml in a follow-up PR."
          } >> "$GITHUB_STEP_SUMMARY"
