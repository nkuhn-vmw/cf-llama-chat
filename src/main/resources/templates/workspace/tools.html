<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools - My Workspace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .tools-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .tool-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s;
        }

        .tool-card:hover {
            border-color: var(--accent-color);
        }

        .tool-card-icon {
            width: 40px;
            height: 40px;
            background-color: var(--bg-tertiary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tool-card-icon svg {
            width: 20px;
            height: 20px;
            color: var(--accent-color);
        }

        .tool-card-info {
            flex: 1;
            min-width: 0;
        }

        .tool-card-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-card-name .badge {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge.mcp {
            background-color: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        .badge.custom {
            background-color: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .tool-card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tool-card-server {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .tool-card-toggle {
            flex-shrink: 0;
        }

        .tool-card-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .empty-tools {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-tools svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-tools p {
            font-size: 0.95rem;
        }

        .tools-info {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Tools</h1>
            <a href="/workspace" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Workspace
            </a>
        </header>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-value" id="totalToolCount">--</div>
                <div class="stat-label">Total Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledCount">--</div>
                <div class="stat-label">Enabled</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mcpCount">--</div>
                <div class="stat-label">MCP Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="customCount">--</div>
                <div class="stat-label">Custom Tools</div>
            </div>
        </div>

        <div class="tools-info">
            Enable or disable individual tools below. Disabled tools will not be available to the AI during chat.
            Tool preferences are saved per-browser and apply immediately to new conversations.
        </div>

        <div style="display:flex; align-items:center; gap:12px; margin-top:16px;">
            <label for="serverFilter" style="font-size:0.9rem; color:var(--text-secondary);">Filter by Server:</label>
            <select id="serverFilter" style="padding:8px 12px; background-color:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.9rem;">
                <option value="">All Servers</option>
            </select>
            <button class="action-btn" id="bulkEnableBtn" style="display:none;">Enable All</button>
            <button class="action-btn" id="bulkDisableBtn" style="display:none;">Disable All</button>
        </div>

        <div class="tools-grid" id="toolsGrid">
            <div class="empty-tools">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
                <p>Loading tools...</p>
            </div>
        </div>
    </div>

    <script th:src="@{/js/admin-theme.js}"></script>
    <script th:src="@{/js/admin-toast.js}"></script>
    <script th:src="@{/js/workspace-tools.js}"></script>
</body>
</html>
