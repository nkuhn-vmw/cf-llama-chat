---
applications:
  - name: enterprise-chat-prod
    memory: 1G
    instances: 1
    path: target/cf-llama-chat-1.0.0-SNAPSHOT.jar
    buildpacks:
      - java_buildpack_offline
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      SPRING_PROFILES_ACTIVE: cloud
      # APP_AUTH_SECRET must be set via `cf set-env` before first start if
      # invitation-only registration is required (APP_REQUIRE_INVITATION=true).
      # APP_ADMIN_DEFAULT_PASSWORD should likewise be set on first deploy —
      # otherwise a random password is generated and printed to the app log.
    services:
      - enterprise-chat-db
      - enterprise-chat-genai
      - enterprise-chat-sso
      - enterprise-mcp-gateway
